name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm validate

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must look like v1.2.3 or v1.2.3-rc.1." >&2
            exit 1
          fi

      - name: Pull runtime images
        run: |
          docker pull --platform linux/amd64 postgres:16-alpine
          docker pull --platform linux/amd64 redis:7-alpine
          docker pull --platform linux/amd64 minio/minio:RELEASE.2024-12-18T13-15-44Z

      - name: Build application images
        run: |
          docker build \
            --platform linux/amd64 \
            --file apps/api/Dockerfile \
            --tag liveboard-api:local \
            .
          docker build \
            --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_API_URL=/api \
            --build-arg NEXT_PUBLIC_SHOW_DEMO_ACCOUNTS=false \
            --file apps/web/Dockerfile \
            --tag liveboard-web:local \
            .

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail

          bundle="liveboard-${GITHUB_REF_NAME}-linux-amd64"
          asset="${bundle}.tar.gz"
          bundle_dir="dist/${bundle}"

          mkdir -p "$bundle_dir"
          docker save \
            postgres:16-alpine \
            redis:7-alpine \
            minio/minio:RELEASE.2024-12-18T13-15-44Z \
            liveboard-api:local \
            liveboard-web:local \
            | gzip -1 >"${bundle_dir}/images.tar.gz"

          cp docker-compose.yml "${bundle_dir}/docker-compose.yml"
          cp .env.production.example "${bundle_dir}/.env.example"
          cp infra/nginx/liveboard.conf "${bundle_dir}/nginx.conf"
          cp scripts/deploy-bundle.sh "${bundle_dir}/deploy.sh"
          chmod +x "${bundle_dir}/deploy.sh"

          {
            echo "release=${GITHUB_REF_NAME}"
            echo "commit=${GITHUB_SHA}"
            echo "platform=linux/amd64"
            echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            for image in \
              postgres:16-alpine \
              redis:7-alpine \
              minio/minio:RELEASE.2024-12-18T13-15-44Z \
              liveboard-api:local \
              liveboard-web:local; do
              docker image inspect \
                --format '{{.RepoTags}} {{.Id}} {{json .RepoDigests}}' \
                "$image"
            done
          } >"${bundle_dir}/manifest.txt"

          (
            cd "$bundle_dir"
            sha256sum images.tar.gz docker-compose.yml deploy.sh nginx.conf .env.example manifest.txt >SHA256SUMS
          )

          tar -C dist -cf - "$bundle" | gzip -1 >"dist/${asset}"
          size=$(stat -c %s "dist/${asset}")
          if [ "$size" -ge 2147483648 ]; then
            echo "Release bundle must stay below GitHub's 2 GiB per-asset limit." >&2
            exit 1
          fi

          rm -rf "$bundle_dir"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/liveboard-${GITHUB_REF_NAME}-linux-amd64.tar.gz" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
